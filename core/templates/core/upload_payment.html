{% extends 'core/base.html' %}

{% block content %}

<div class="page-title">
    <div>
        <h2>Upload Payment</h2>
        <p>Submit your payment screenshot for verification</p>
    </div>

    <a href="javascript:history.back()" class="btn btn-secondary">← Back</a>
</div>

<div class="card">
    <p><strong>Customer:</strong> {{ bill.customer.name }}</p>
    <p><strong>Bill:</strong> {{ bill.month }} {{ bill.year }}</p>
    <p><strong>Total Amount:</strong> ₹ {{ bill.total_amount }}</p>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div style="margin-bottom:15px;">
            <label>Amount</label>
            <input type="number" step="0.01" name="amount" required>
        </div>

        <div style="margin-bottom:15px;">
            <label>Screenshot</label>
            <input type="file" name="screenshot">
        </div>

        <button type="submit" class="btn">Upload Payment</button>
    </form>
</div>

{% endblock %}
