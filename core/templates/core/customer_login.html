<!DOCTYPE html>
<html>
<head>
    <title>Customer Login</title>
    <style>
        body { font-family: Arial; background:#f3f4f6; }
        .box { width:400px; margin:100px auto; background:white; padding:30px; border-radius:14px; box-shadow:0 4px 14px rgba(0,0,0,0.1); }
        input { width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:8px; box-sizing:border-box; }
        button { width:100%; padding:12px; background:#2563eb; color:white; border:none; border-radius:8px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Customer Login</h2>
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="phone" placeholder="Phone Number" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
